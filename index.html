<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ejemplo API Clima</title>
</head>
<body>

  <h2>Clima en Santo Domingo</h2>
  <button onclick="obtenerClima()">Consultar clima</button>

  <p id="resultado"></p>

  <script>
    function obtenerClima() {
      // Coordenadas de Santo Domingo
      const url =
        "https://api.open-meteo.com/v1/forecast?latitude=18.48&longitude=-69.91&current_weather=true";

      fetch(url)
        .then(response => response.json())
        .then(data => {
          const clima = data.current_weather;

          const resultado = `
            Temperatura: ${clima.temperature} °C <br>
            Velocidad del viento: ${clima.windspeed} km/h <br>
            Dirección del viento: ${clima.winddirection}° <br>
            Hora: ${clima.time}
          `;

          document.getElementById("resultado").innerHTML = resultado;
        })
        .catch(error => {
          document.getElementById("resultado").innerText =
            "Error al obtener datos";
          console.error(error);
        });
    }
  </script>

</body>
</html>
